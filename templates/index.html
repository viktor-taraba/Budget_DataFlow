<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Бюджет</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="brand">
    <div class="brand__mark"></div>
    <div class="brand__title">Бюджет</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, m in messages %}
        <div class="flash {% if category == 'success' %}flash--success{% endif %}">{{ m }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="card">
	<form method="post" action="{{ url_for('submit') }}" id="entry-form">
      <input type="hidden" name="submitted_at" id="submitted_at">
      <div class="segmented">
        <input type="radio" id="type-expense" name="type" value="expense" checked>
        <input type="radio" id="type-income" name="type" value="income">
        <div class="segmented__track">
          <label for="type-expense">Витрата</label>
          <label for="type-income">Дохід</label>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="amount">Сума</label>
        <div class="amount-wrap">
          <span class="currency">₴</span>
          <input type="text" inputmode="decimal" id="amount" name="amount" placeholder="0" data-min="0.01" required="" autofocus="">
	    </div>
      </div>

      <div class="field">
        <label class="field-label" for="category">Категорія</label>
        <select id="category" name="category" required>
          <!-- заповнюється JS-ом залежно від типу -->
        </select>
      </div>

      <div class="field">
        <label class="field-label" for="date">Дата</label>
        <input type="date" id="date" name="date" value="{{ today }}" max="{{ today }}" required>
      </div>

      <div class="field">
        <label class="field-label" for="note">Коментар (необов'язково)</label>
        <input type="text" id="note" name="note" placeholder="Наприклад: АТБ, тиждень">
      </div>

      <button class="submit-btn" type="submit">Зберегти запис</button>
    </form>
  </div>

  <a class="footer-link" href="{{ url_for('logout') }}">Вийти</a>

  <script>
	  const categories = {
	  expense: {{ categories.expense | tojson }},
	  income: {{ categories.income | tojson }}
	  };

	  const select = document.getElementById('category');
	  const radios = document.querySelectorAll('input[name="type"]');

	  function fillCategories(type) {
	  select.innerHTML = '';
	  categories[type].forEach((cat) => {
	  const opt = document.createElement('option');
	  opt.value = cat;
	  opt.textContent = cat;
	  select.appendChild(opt);
	  });
	  }

	  radios.forEach((r) => r.addEventListener('change', (e) => fillCategories(e.target.value)));
	  fillCategories(document.querySelector('input[name="type"]:checked').value);

	  // Фіксуємо момент, коли користувач фактично натиснув "Зберегти", а не коли відкрив сторінку.
	  // Валідація перед відправкою — щоб не чекати round-trip до сервера
	  // заради очевидних помилок (порожня сума, від'ємне число, дата з майбутнього).
	  document.getElementById('entry-form').addEventListener('submit', (e) => {
	  const amountInput = document.getElementById('amount');
	  const dateInput = document.getElementById('date');
	  const minAmount = parseFloat(amountInput.dataset.min || '0.01');

	  amountInput.setCustomValidity('');
	  dateInput.setCustomValidity('');

	  const amountValue = parseFloat(amountInput.value.replace(',', '.'));
	  if (isNaN(amountValue) || amountValue < minAmount) {
        amountInput.setCustomValidity(`Сума має бути не менше ${minAmount}`);
      }

      if (dateInput.value && dateInput.value > dateInput.max) {
		  dateInput.setCustomValidity('Дата не може бути в майбутньому');
		  }

		  if (!e.target.checkValidity()) {
			e.preventDefault();
			e.target.reportValidity();
		  return;
		  }

		  document.getElementById('submitted_at').value = new Date().toISOString();
		  });

		  // Дозволяємо кому як десятковий роздільник
		  // одразу скидаємо повідомлення про помилку, щойно людина почала правити поле (інакше воно "залипає" від попередньої невдалої спроби відправки)
		  document.getElementById('amount').addEventListener('input', (e) => {
			e.target.value = e.target.value.replace(/[^0-9.,]/g, '');
			e.target.setCustomValidity('');
		  });

		  document.getElementById('date').addEventListener('input', (e) => {
			e.target.setCustomValidity('');
		  });
	  </script>
</body>
</html>
