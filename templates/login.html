<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Вхід — Бюджет</title>
  <script>
	(function () {
	    const stored = localStorage.getItem('theme');
	    const theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
	    document.documentElement.setAttribute('data-theme', theme);
	})();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="brand">
	<div class="brand__left">
	  <div class="brand__mark"></div>
	  <div class="brand__title">Бюджет <span>· вхід</span></div>
	</div>
	<button type="button" class="theme-toggle" id="theme-toggle" aria-label="Перемкнути тему" title="Перемкнути світлу/темну тему">🌙</button>
  </div>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}
        <div class="flash">{{ m }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="login-card">
    <form method="post">
      <div class="field">
        <label class="field-label" for="password">Пароль</label>
        <input type="password" id="password" name="password" autofocus required>
      </div>
      <button class="submit-btn" type="submit">Увійти</button>
    </form>
  </div>

  <script>
	const themeToggle = document.getElementById('theme-toggle');
	
	function updateToggleIcon() {
		const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
		themeToggle.textContent = isDark ? '☀️' : '🌙';
	}
	
	themeToggle.addEventListener('click', () => {
		const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
		const next = isDark ? 'light' : 'dark';
		document.documentElement.setAttribute('data-theme', next);
		localStorage.setItem('theme', next);
		updateToggleIcon();
	});
	
	updateToggleIcon();
	</script>
	
</body>
</html>
